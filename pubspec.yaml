name: nexride_driver
description: NexRide Driver App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  audioplayers: ^5.2.1  
  url_launcher: ^6.2.5

  cupertino_icons: ^1.0.8

  # Maps
  google_maps_flutter: ^2.5.0

  # Location
  geolocator: ^10.1.0
  geoflutterfire2: ^2.3.15
  geocoding: ^2.1.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.17.5
  firebase_database: ^10.0.0
  firebase_storage: ^11.7.7

  # HTTP (Google Directions API)
  http: ^1.2.1
  agora_rtc_engine: 6.5.3
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  file_picker: ^4.6.1

  # Polyline
  flutter_polyline_points: ^2.1.0

  # Animations
  lottie: ^2.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/car.png
    - assets/animations/
    - assets/sounds/ride_request.mp3
